name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create Android App
      run: |
        mkdir -p app/src/main/java/com/example/app
        mkdir -p app/src/main/res/values
        
        echo '<?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.app">
            <application android:label="Attendance App">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>' > app/src/main/AndroidManifest.xml
        
        echo 'package com.example.app
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(android.R.layout.activity_main)
            }
        }' > app/src/main/java/com/example/app/MainActivity.kt
        
        echo '<?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Attendance App</string>
        </resources>' > app/src/main/res/values/strings.xml
    
    - name: Create Gradle Files
      run: |
        echo 'buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:7.4.2"
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }' > build.gradle
        
        echo 'pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "AttendanceApp"
        include ":app"' > settings.gradle
        
        echo 'plugins {
            id "com.android.application"
            id "kotlin-android"
        }
        android {
            compileSdk 33
            defaultConfig {
                applicationId "com.example.app"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation "androidx.appcompat:appcompat:1.6.1"
            implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
        }' > app/build.gradle
    
    - name: Setup Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        curl -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
    
    - name: Build APK
      run: |
        echo '#!/bin/bash' > gradlew
        echo 'exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: AttendanceApp
        path: app/build/outputs/apk/debug/*.apk
