name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Make simple APK
      run: |
        mkdir -p app/src/main/java/com/example/app
        mkdir -p app/src/main/res/values
        
        echo '<?xml version="1.0" encoding="utf-8"?>
        <manifest package="com.example.app">
        <application android:label="Attendance App">
        <activity android:name=".MainActivity" android:exported="true">
        <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
        </activity>
        </application>
        </manifest>' > app/src/main/AndroidManifest.xml
        
        echo 'package com.example.app
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(android.R.layout.activity_main)
            }
        }' > app/src/main/java/com/example/app/MainActivity.kt
        
        echo '<?xml version="1.0" encoding="utf-8"?>
        <resources>
        <string name="app_name">Attendance App</string>
        </resources>' > app/src/main/res/values/strings.xml
    
    - name: Build
      run: |
        echo 'apply plugin: "com.android.application"' > app/build.gradle
        echo 'android { compileSdk 33 defaultConfig { applicationId "com.example.app" minSdk 21 targetSdk 33 } }' >> app/build.gradle
        echo 'dependencies { implementation "androidx.appcompat:appcompat:1.6.1" }' >> app/build.gradle
        echo 'buildscript { repositories { google() mavenCentral() } dependencies { classpath "com.android.tools.build:gradle:7.4.2" } }' > build.gradle
        echo 'allprojects { repositories { google() mavenCentral() } }' >> build.gradle
        echo 'include ":app"' > settings.gradle
        mkdir -p gradle/wrapper
        curl -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
        echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip' > gradle/wrapper/gradle-wrapper.properties
        echo '#!/bin/bash' > gradlew
        echo 'exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: MyApp
        path: app/build/outputs/apk/debug/*.apk
